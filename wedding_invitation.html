<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아담 & 하와 결혼식 청첩장</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 450px;
            width: 95%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            animation: fadeIn 2s ease-out;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f093fb, #f5576c);
            border-radius: 30px;
            z-index: -1;
            opacity: 0.7;
            animation: sparkle 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .photo-section {
            margin: 30px 0;
            animation: fadeIn 2.5s ease-out;
        }

        .couple-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: heartbeat 2s ease-in-out infinite;
        }

        .names {
            font-size: 2.2em;
            margin: 25px 0;
            font-weight: bold;
            animation: fadeIn 3s ease-out;
        }

        .heart {
            color: #ff6b9d;
            font-size: 2.5em;
            margin: 0 15px;
            animation: heartbeat 1.5s ease-in-out infinite;
            display: inline-block;
        }

        .details {
            margin: 30px 0;
            line-height: 1.8;
            animation: fadeIn 3.5s ease-out;
        }

        .date, .time, .location {
            margin: 15px 0;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            min-width: 200px;
        }

        .message {
            margin: 40px 0;
            font-style: italic;
            line-height: 1.6;
            font-size: 1.1em;
            animation: fadeIn 4s ease-out;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.95em;
            opacity: 0.9;
            animation: fadeIn 4.5s ease-out;
        }

        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        .sparkle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 60%; left: 80%; animation-delay: 1s; }
        .sparkle:nth-child(3) { top: 40%; left: 60%; animation-delay: 2s; }
        .sparkle:nth-child(4) { top: 80%; left: 30%; animation-delay: 0.5s; }
        .sparkle:nth-child(5) { top: 10%; left: 70%; animation-delay: 1.5s; }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2em;
            }
            .names {
                font-size: 1.8em;
            }
            .couple-photo {
                width: 150px;
                height: 150px;
            }
            .date, .time, .location {
                font-size: 1em;
                min-width: 150px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 500px;
                padding: 50px 40px;
            }
            h1 {
                font-size: 3.2em;
            }
            .names {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="sparkles">
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
    </div>
    <div class="container">
        <h1>결혼식 청첩장</h1>
        <div class="photo-section">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=400&h=400&fit=crop&crop=face" alt="아담과 하와" class="couple-photo">
        </div>
        <div class="names">
            아담 <span class="heart">♥</span> 하와
        </div>
        <div class="details">
            <div class="date">2026년 5월 1일</div>
            <div class="time">오후 3시</div>
            <div class="location">천국 정원</div>
        </div>
        <div class="message">
            서로를 아끼고 사랑하며<br>
            새로운 시작을 함께 하려 합니다.<br>
            따뜻한 마음으로 축하해 주시면<br>
            더없이 기쁘겠습니다.
        </div>
        <div class="footer">
            연락처: 010-1234-5678<br>
            #아담하와결혼 #천국결혼식
        </div>
    </div>
</body>
</html>
